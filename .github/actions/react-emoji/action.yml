name: React Emoji
description: Add a GitHub reaction to an issue or comment URL.

inputs:
  url:
    required: true
  reaction:
    required: true
  token:
    required: true

runs:
  using: composite
  steps:
    - name: Add reaction
      shell: bash
      env:
        TARGET_URL: ${{ inputs.url }}
        REACTION: ${{ inputs.reaction }}
        TOKEN: ${{ inputs.token }}
      run: |
        CLEAN_TOKEN="${TOKEN//$'\r'/}"
        CLEAN_TOKEN="${CLEAN_TOKEN//$'\n'/}"

        if [ -z "$CLEAN_TOKEN" ]; then
          echo "GitHub token is required to add a reaction." >&2
          exit 1
        fi

        RESPONSE_FILE=$(mktemp)
        PAYLOAD=$(jq -n --arg content "$REACTION" '{content: $content}')
        HTTP_STATUS=$(curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
          -X POST \
          -H "Authorization: token ${CLEAN_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Content-Type: application/json" \
          "${TARGET_URL}/reactions" \
          -d "$PAYLOAD")

        if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
          cat "$RESPONSE_FILE" >&2
          exit 1
        fi
