          read -r -a patterns <<< "$FILE_EXTENSIONS"
          DIFF=$(git diff "origin/${BASE_BRANCH}...HEAD" -- "${patterns[@]}" | head -c "$MAX_DIFF_SIZE")
          {
            echo "diff<<GHEOF"
            echo "$DIFF"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Record initial HEAD for checks fix attempt 3
        if: steps.pr_checks_after_fix_2.outputs.status == 'failed' && steps.checks_attempts.outputs.allow_attempt_3 == 'true'
        id: cifix_3_initial_head
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run agent checks fix attempt 3
        if: steps.pr_checks_after_fix_2.outputs.status == 'failed' && steps.checks_attempts.outputs.allow_attempt_3 == 'true'
        id: cifix_3
        uses: youngrok-XCENA/relay/.github/actions/run-agent@main
        with:
          agent: ${{ inputs.agent }}
          node_path: ${{ inputs.node_path }}
          codex_sandbox: ${{ inputs.codex_sandbox }}
          prompt: |
            You are fixing failing pull request checks for the ${{ inputs.project_description }} project.

            ## PR #${{ steps.pr.outputs.number }}
            **Branch:** ${{ steps.branch.outputs.name }} -> ${{ inputs.base_branch }}
            **Attempt:** 3 / ${{ steps.checks_attempts.outputs.value }}

            ## Failing PR Checks
            ${{ steps.pr_checks_after_fix_2.outputs.summary }}

            ## Current Diff
            ```diff
            ${{ steps.current_diff_attempt_3.outputs.diff }}
            ```

            ## Rules
            - Make the failing PR checks pass on the current branch.
            - The check output above is the source of truth, even if it differs from build_command or test_command.
            - Prefer the smallest safe change that fixes the reported failure.
            - If the failure looks flaky or external to the repository, explain that instead of making risky code changes.
            - Follow this code style guide: ${{ inputs.code_style_guide }}
            - Build and verify with: ${{ inputs.build_command }}
            - Run relevant tests if possible with: ${{ inputs.test_command }}
            - If format_command is non-empty, run it on changed files after the fix: ${{ inputs.format_command }}
            - Do not modify files outside the scope of the requested changes.
            - Do not post issue comments, create PRs, or use GitHub tools for side effects.
            - Do not describe tool/auth limitations in the final response.
            - End your response with a section titled "### checks 반영 결과" containing a markdown table
              that lists each failing PR check and whether it was addressed.
              Use ✅ 수정됨 if fixed, ⚠️ 미반영 with a brief reason if not.
          model: ${{ inputs.model }}
          max_turns: ${{ inputs.max_prfix_turns }}

      - name: Format and commit checks fix attempt 3
        if: steps.cifix_3.outcome == 'success' && steps.cifix_3.outputs.exit_code == '0'
        id: cifix_3_push
        uses: youngrok-XCENA/relay/.github/actions/format-and-commit@main
        with:
          format_command: ${{ inputs.format_command }}
          base_ref: ${{ steps.cifix_3_initial_head.outputs.sha }}
          diff_mode: sha
          bot_user: ${{ inputs.bot_user }}
          bot_email: ${{ inputs.bot_email }}
          commit_message: "fix: address failing PR checks on PR #${{ steps.pr.outputs.number }} (attempt 3)"
          push_branch: ${{ steps.branch.outputs.name }}

      - name: Post checks fix comment attempt 3
        if: steps.cifix_3_push.outputs.has_changes == 'true'
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: |
            ### ${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} PR Checks Fix (Attempt 3)

            ${{ steps.cifix_3.outputs.result }}

            ---
            > 🤖 *${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} CI · [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          target: ${{ steps.pr.outputs.number }}
          type: pr
          repository: ${{ github.repository }}

      - name: Wait for PR checks after checks fix attempt 3
        if: steps.cifix_3_push.outputs.has_changes == 'true'
        id: pr_checks_after_fix_3
        uses: youngrok-XCENA/relay/.github/actions/collect-pr-checks@main
        with:
          repository: ${{ github.repository }}
          pr_number: ${{ steps.pr.outputs.number }}
          max_wait_minutes: ${{ inputs.check_wait_minutes }}
          poll_interval_seconds: ${{ inputs.check_poll_interval_seconds }}

      # ── Final Status ─────────────────────────────────────────────────
      - name: Post final status
        if: always()
        shell: bash
        env:
          ANALYSIS_EXIT: ${{ steps.analysis.outputs.exit_code }}
          FIX_EXIT: ${{ steps.fix.outputs.exit_code }}
          FIX_FAILURE: ${{ steps.fix.outputs.failure_type }}
          FIX_RESULT: ${{ steps.fix.outputs.result }}
          HAS_CHANGES: ${{ steps.push.outputs.has_changes }}
          PR_URL: ${{ steps.pr.outputs.url }}
          REVIEW_EXIT: ${{ steps.review.outputs.exit_code }}
          REVIEW_RESULT: ${{ steps.review.outputs.result }}
          NEEDS_FIX: ${{ steps.review_check.outputs.needs_fix }}
          PRFIX_EXIT: ${{ steps.prfix.outputs.exit_code }}
          PRFIX_RESULT: ${{ steps.prfix.outputs.result }}
          PRFIX_HAS_CHANGES: ${{ steps.prfix_push.outputs.has_changes }}
          CHECK_FIX_MAX_ATTEMPTS: ${{ steps.checks_attempts.outputs.value }}
          PR_CHECK_STATUS: ${{ steps.pr_checks.outputs.status }}
          PR_CHECK_SUMMARY: ${{ steps.pr_checks.outputs.summary }}
          CI_FIX_1_EXIT: ${{ steps.cifix.outputs.exit_code }}
          CI_FIX_1_RESULT: ${{ steps.cifix.outputs.result }}
          CI_FIX_1_HAS_CHANGES: ${{ steps.cifix_push.outputs.has_changes }}
          PR_CHECK_STATUS_AFTER_FIX_1: ${{ steps.pr_checks_after_fix.outputs.status }}
          PR_CHECK_SUMMARY_AFTER_FIX_1: ${{ steps.pr_checks_after_fix.outputs.summary }}
          CI_FIX_2_EXIT: ${{ steps.cifix_2.outputs.exit_code }}
          CI_FIX_2_RESULT: ${{ steps.cifix_2.outputs.result }}
          CI_FIX_2_HAS_CHANGES: ${{ steps.cifix_2_push.outputs.has_changes }}
          PR_CHECK_STATUS_AFTER_FIX_2: ${{ steps.pr_checks_after_fix_2.outputs.status }}
          PR_CHECK_SUMMARY_AFTER_FIX_2: ${{ steps.pr_checks_after_fix_2.outputs.summary }}
          CI_FIX_3_EXIT: ${{ steps.cifix_3.outputs.exit_code }}
          CI_FIX_3_RESULT: ${{ steps.cifix_3.outputs.result }}
          CI_FIX_3_HAS_CHANGES: ${{ steps.cifix_3_push.outputs.has_changes }}
          PR_CHECK_STATUS_AFTER_FIX_3: ${{ steps.pr_checks_after_fix_3.outputs.status }}
          PR_CHECK_SUMMARY_AFTER_FIX_3: ${{ steps.pr_checks_after_fix_3.outputs.summary }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          FOOTER="

          ---
          > 🤖 *${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} CI · [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          if [ "$ANALYSIS_EXIT" = "0" ]; then
            ANALYSIS_STATUS="✅ 완료"
          else
            ANALYSIS_STATUS="❌ 실패"
          fi

          if [ "$FIX_EXIT" != "0" ]; then
            if [ "$FIX_FAILURE" = "usage_limit" ]; then
              BODY="### ${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} Auto Pipeline

          ❌ 파이프라인 실패 — AI 에이전트 사용량 한도에 도달했습니다. 한도 리셋 후 다시 시도하세요.${FOOTER}"
            elif [ "$FIX_FAILURE" = "auth_error" ]; then
              BODY="### ${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} Auto Pipeline

          ❌ 파이프라인 실패 — 인증 오류. API 키를 확인하세요.${FOOTER}"
            else
              BODY="### ${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} Auto Pipeline

          ❌ 코드 패치 단계에서 실패했습니다.${FOOTER}"
            fi
          elif [ "$HAS_CHANGES" = "false" ]; then
            BODY="### ${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} Auto Pipeline

          수정할 내용을 찾지 못했습니다.

          <details><summary>에이전트 출력</summary>

          ${FIX_RESULT}

          </details>${FOOTER}"
          elif [ -z "$PR_URL" ]; then
            BODY="### ${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} Auto Pipeline

          ❌ PR 생성에 실패했습니다.${FOOTER}"
          else
            FIX_STATUS="✅ 완료"
            PR_STATUS="✅ ${PR_URL}"

            if [ "$REVIEW_EXIT" = "0" ]; then
              REVIEW_STATUS="✅ 완료"
            else
              REVIEW_STATUS="❌ 실패"
            fi

            if [ "$NEEDS_FIX" = "true" ]; then
              if [ "$PRFIX_EXIT" = "0" ] && [ "$PRFIX_HAS_CHANGES" = "true" ]; then
                PRFIX_STATUS="✅ 추가 패치 커밋 완료"
              elif [ "$PRFIX_EXIT" = "0" ]; then
                PRFIX_STATUS="✅ 수정 불필요"
              else
                PRFIX_STATUS="❌ 실패"
              fi
            else
              PRFIX_STATUS="⏭️ 스킵 (CRITICAL/HIGH 이슈 없음)"
            fi

            EFFECTIVE_CHECK_FIX_ATTEMPTS="${CHECK_FIX_MAX_ATTEMPTS:-1}"
            FINAL_CHECK_STATUS="$PR_CHECK_STATUS"
            FINAL_CHECK_SUMMARY="$PR_CHECK_SUMMARY"
            CHECKS_STATUS="⏭️ 미실행"
            CHECKS_FIX_STATUS="⏭️ 스킵"
            CHECK_FIX_ATTEMPTS_USED=0
            CHECK_FIX_FAILED_STEP=false
            CHECK_FIX_NO_CHANGES=false

            if [ "$PR_CHECK_STATUS" = "failed" ]; then
              if [ "$EFFECTIVE_CHECK_FIX_ATTEMPTS" = "0" ]; then
                CHECKS_STATUS="❌ 실패"
                CHECKS_FIX_STATUS="⏭️ 스킵 (max_check_fix_attempts=0)"
              else
                for attempt in 1 2 3; do
                  if [ "$attempt" -gt "$EFFECTIVE_CHECK_FIX_ATTEMPTS" ]; then
                    break
                  fi

                  EXIT_VAR="CI_FIX_${attempt}_EXIT"
                  RESULT_VAR="CI_FIX_${attempt}_RESULT"
                  CHANGES_VAR="CI_FIX_${attempt}_HAS_CHANGES"
                  AFTER_STATUS_VAR="PR_CHECK_STATUS_AFTER_FIX_${attempt}"
                  AFTER_SUMMARY_VAR="PR_CHECK_SUMMARY_AFTER_FIX_${attempt}"

                  ATTEMPT_EXIT="${!EXIT_VAR:-}"
                  ATTEMPT_RESULT="${!RESULT_VAR:-}"
                  ATTEMPT_HAS_CHANGES="${!CHANGES_VAR:-}"
                  ATTEMPT_AFTER_STATUS="${!AFTER_STATUS_VAR:-}"
                  ATTEMPT_AFTER_SUMMARY="${!AFTER_SUMMARY_VAR:-}"

                  if [ -z "$ATTEMPT_EXIT" ]; then
                    break
                  fi

                  CHECK_FIX_ATTEMPTS_USED="$attempt"

                  if [ "$ATTEMPT_EXIT" != "0" ]; then
                    CHECK_FIX_FAILED_STEP=true
                    CHECKS_FIX_STATUS="❌ ${attempt}차 패치 실패"
                    break
                  fi

                  if [ "$ATTEMPT_HAS_CHANGES" != "true" ]; then
                    CHECK_FIX_NO_CHANGES=true
                    CHECKS_FIX_STATUS="⚠️ ${attempt}차 수정안 없음"
                    break
                  fi

                  FINAL_CHECK_STATUS="$ATTEMPT_AFTER_STATUS"
                  FINAL_CHECK_SUMMARY="$ATTEMPT_AFTER_SUMMARY"

                  case "$FINAL_CHECK_STATUS" in
                    passed)
                      CHECKS_FIX_STATUS="✅ ${attempt}회 추가 패치 후 통과"
                      break
                      ;;
                    no_checks)
                      CHECKS_FIX_STATUS="✅ ${attempt}회 추가 패치 후 checks 없음"
                      break
                      ;;
                    timed_out)
                      CHECKS_FIX_STATUS="⏱️ ${attempt}회 추가 패치 후 재검증 타임아웃"
                      break
                      ;;
                    api_error)
                      CHECKS_FIX_STATUS="❌ ${attempt}회 추가 패치 후 조회 실패"
                      break
                      ;;
                    failed)
                      if [ "$attempt" -eq "$EFFECTIVE_CHECK_FIX_ATTEMPTS" ]; then
                        CHECKS_FIX_STATUS="❌ ${attempt}회 추가 패치 후에도 실패"
                      fi
                      ;;
                    *)
                      CHECKS_FIX_STATUS="⚠️ ${attempt}회 추가 패치 후 결과 미확인"
                      break
                      ;;
                  esac
                done

                case "$FINAL_CHECK_STATUS" in
                  passed)
                    CHECKS_STATUS="✅ 추가 패치 후 모두 통과"
                    ;;
                  no_checks)
                    CHECKS_STATUS="✅ 추가 패치 후 checks 없음"
                    ;;
                  timed_out)
                    CHECKS_STATUS="⏱️ 추가 패치 후 재검증 타임아웃"
                    ;;
                  api_error)
                    CHECKS_STATUS="❌ 추가 패치 후 조회 실패"
                    ;;
                  failed)
                    if [ "$CHECK_FIX_FAILED_STEP" = true ] || [ "$CHECK_FIX_NO_CHANGES" = true ] || [ "$CHECK_FIX_ATTEMPTS_USED" -eq 0 ]; then
                      CHECKS_STATUS="❌ 실패"
                    else
                      CHECKS_STATUS="❌ ${CHECK_FIX_ATTEMPTS_USED}회 추가 패치 후에도 실패"
                    fi
                    ;;
                  *)
                    CHECKS_STATUS="⚠️ 추가 패치 후 결과 미확인"
                    ;;
                esac
              fi
            else
              case "$PR_CHECK_STATUS" in
                passed)
                  CHECKS_STATUS="✅ 모두 통과"
                  CHECKS_FIX_STATUS="⏭️ 스킵 (실패 없음)"
                  ;;
                no_checks)
                  CHECKS_STATUS="⏭️ 등록된 checks 없음"
                  CHECKS_FIX_STATUS="⏭️ 스킵 (등록된 checks 없음)"
                  ;;
                timed_out)
                  CHECKS_STATUS="⏱️ 대기 타임아웃"
                  CHECKS_FIX_STATUS="⏭️ 스킵 (checks 완료 전 종료)"
                  ;;
                api_error)
                  CHECKS_STATUS="❌ 조회 실패"
                  CHECKS_FIX_STATUS="⏭️ 스킵 (checks 조회 실패)"
                  ;;
                *)
                  CHECKS_STATUS="⏭️ 미실행"
                  CHECKS_FIX_STATUS="⏭️ 스킵"
                  ;;
              esac
            fi

            BODY="### ${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} Auto Pipeline

          | 단계 | 상태 |
          |------|------|
          | 1. 이슈 분석 | ${ANALYSIS_STATUS} |
          | 2. 코드 패치 | ${FIX_STATUS} |
          | 3. PR 생성 | ${PR_STATUS} |
          | 4. 코드 리뷰 | ${REVIEW_STATUS} |
          | 5. 리뷰 반영 | ${PRFIX_STATUS} |
          | 6. PR checks 확인 | ${CHECKS_STATUS} |
          | 7. checks 실패 반영 | ${CHECKS_FIX_STATUS} |${FOOTER}"
          fi

          if [ ${#BODY} -gt 65000 ]; then
            BODY="${BODY:0:64900}

          ...(truncated)"
          fi

          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "$BODY"

  notify-pipeline-timeout:
    name: Notify Pipeline Timeout
    needs: [auto-pipeline]
    if: inputs.mode == 'auto-pipeline' && cancelled()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: Post timeout comment
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: |
            ### ${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} Auto Pipeline

            ⏱️ 파이프라인이 ${{ inputs.timeout_minutes }}분 타임아웃으로 취소되었습니다. [워크플로우 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})를 확인하세요.

            ---
            > 🤖 *${{ inputs.agent == 'claude' && 'Claude' || 'Codex' }} CI · [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          target: ${{ github.event.issue.number }}
          type: issue
          repository: ${{ github.repository }}
