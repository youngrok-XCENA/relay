# Generated by youngrok-XCENA/relay/install.sh v1.0.0
name: Relay Claude
on:
  issues:
    types: [opened, reopened, closed, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  review:
    if: >
      startsWith(github.event.comment.body, '/claude-review') &&
      (github.event_name == 'pull_request_review_comment' || github.event.issue.pull_request)
    uses: youngrok-XCENA/relay/.github/workflows/relay.yml@main
    with:
      agent: "claude"
      mode: review
      project_description: "GitHub Actions reusable CI workflows (YAML/Shell)"
      code_style_guide: "YAML/Shell scripting conventions"
      file_extensions: "*.yml *.yaml *.sh *.json"
      trigger_command: "/claude-review"
      title_keyword: "claude"
      branch_prefix: "claude/fix-issue-"
      bot_user: "claude-ci[bot]"
      bot_email: "claude-ci[bot]@users.noreply.github.com"
      runner: '["self-hosted", "claude-ci"]'
      codex_sandbox: "read-only"
      max_review_turns: 10
      timeout_minutes: 15
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  fix:
    if: >
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/claude-fix')
    uses: youngrok-XCENA/relay/.github/workflows/relay.yml@main
    with:
      agent: "claude"
      mode: fix
      project_description: "GitHub Actions reusable CI workflows (YAML/Shell)"
      build_command: ""
      test_command: ""
      code_style_guide: "YAML/Shell scripting conventions"
      trigger_command: "/claude-fix"
      title_keyword: "claude"
      branch_prefix: "claude/fix-issue-"
      base_branch: "main"
      bot_user: "claude-ci[bot]"
      bot_email: "claude-ci[bot]@users.noreply.github.com"
      runner: '["self-hosted", "claude-ci"]'
      codex_sandbox: "read-only"
      timeout_minutes: 30
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  pr-fix:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/claude-fix')
    uses: youngrok-XCENA/relay/.github/workflows/relay.yml@main
    with:
      agent: "claude"
      mode: pr-fix
      project_description: "GitHub Actions reusable CI workflows (YAML/Shell)"
      code_style_guide: "YAML/Shell scripting conventions"
      trigger_command: "/claude-fix"
      title_keyword: "claude"
      branch_prefix: "claude/fix-issue-"
      bot_user: "claude-ci[bot]"
      bot_email: "claude-ci[bot]@users.noreply.github.com"
      runner: '["self-hosted", "claude-ci"]'
      codex_sandbox: "read-only"
      timeout_minutes: 30
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  triage:
    if: >
      (github.event_name == 'issues' &&
       (github.event.action == 'closed' ||
        ((github.event.action == 'opened' || github.event.action == 'reopened') &&
         contains(github.event.issue.title, 'claude') &&
         !contains(github.event.issue.title, 'claude-auto')))) ||
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/claude-issue') &&
       github.event.comment.user.type != 'Bot' &&
       github.event.sender.login != 'github-actions[bot]')
    uses: youngrok-XCENA/relay/.github/workflows/relay.yml@main
    with:
      agent: "claude"
      mode: triage
      project_description: "GitHub Actions reusable CI workflows (YAML/Shell)"
      trigger_command: "/claude-issue"
      title_keyword: "claude"
      auto_title_keyword: "claude-auto"
      branch_prefix: "claude/fix-issue-"
      bot_user: "claude-ci[bot]"
      bot_email: "claude-ci[bot]@users.noreply.github.com"
      runner: '["self-hosted", "claude-ci"]'
      codex_sandbox: "read-only"
      max_turns: 15
      timeout_minutes: 20
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  auto-pipeline:
    if: >
      github.event_name == 'issues' &&
      ((github.event.action == 'labeled' &&
        github.event.label.name == 'auto-fix') ||
       ((github.event.action == 'opened' || github.event.action == 'reopened') &&
        contains(github.event.issue.title, 'claude-auto')))
    uses: youngrok-XCENA/relay/.github/workflows/relay.yml@main
    with:
      agent: "claude"
      mode: auto-pipeline
      project_description: "GitHub Actions reusable CI workflows (YAML/Shell)"
      code_style_guide: "YAML/Shell scripting conventions"
      file_extensions: "*.yml *.yaml *.sh *.json"
      trigger_command: "/claude-issue"
      title_keyword: "claude"
      auto_title_keyword: "claude-auto"
      branch_prefix: "claude/fix-issue-"
      bot_user: "claude-ci[bot]"
      bot_email: "claude-ci[bot]@users.noreply.github.com"
      runner: '["self-hosted", "claude-ci"]'
      codex_sandbox: "read-only"
      timeout_minutes: 60
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
