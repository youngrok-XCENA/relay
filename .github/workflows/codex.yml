        if: steps.cifix_2_push.outputs.has_changes == 'true'
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: |
            ### Codex PR Checks Fix (Attempt 2)

            ${{ steps.cifix_2.outputs.result }}

            ---
            > 🤖 *Codex CI · [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          target: ${{ steps.pr.outputs.number }}
          type: pr
          repository: ${{ github.repository }}

      - name: Wait for PR checks after checks fix attempt 2
        if: steps.cifix_2_push.outputs.has_changes == 'true'
        id: pr_checks_after_fix_2
        uses: youngrok-XCENA/relay/.github/actions/collect-pr-checks@main
        with:
          repository: ${{ github.repository }}
          pr_number: ${{ steps.pr.outputs.number }}
          max_wait_minutes: ${{ inputs.check_wait_minutes }}
          poll_interval_seconds: ${{ inputs.check_poll_interval_seconds }}

      - name: Refresh diff for PR checks fix attempt 3
        if: steps.pr_checks_after_fix_2.outputs.status == 'failed' && steps.checks_attempts.outputs.allow_attempt_3 == 'true'
        id: current_diff_attempt_3
        shell: bash
        env:
          FILE_EXTENSIONS: ${{ inputs.file_extensions }}
          MAX_DIFF_SIZE: ${{ inputs.max_diff_size }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          read -r -a patterns <<< "$FILE_EXTENSIONS"
          DIFF=$(git diff "origin/${BASE_BRANCH}...HEAD" -- "${patterns[@]}" | head -c "$MAX_DIFF_SIZE")
          {
            echo "diff<<GHEOF"
            echo "$DIFF"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Record initial HEAD for checks fix attempt 3
        if: steps.pr_checks_after_fix_2.outputs.status == 'failed' && steps.checks_attempts.outputs.allow_attempt_3 == 'true'
        id: cifix_3_initial_head
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run Codex checks fix attempt 3
        if: steps.pr_checks_after_fix_2.outputs.status == 'failed' && steps.checks_attempts.outputs.allow_attempt_3 == 'true'
        id: cifix_3
        uses: youngrok-XCENA/relay/.github/actions/run-codex@main
        with:
          prompt: |
            You are fixing failing pull request checks for the ${{ inputs.project_description }} project.

            ## PR #${{ steps.pr.outputs.number }}
            **Branch:** ${{ steps.branch.outputs.name }} -> ${{ inputs.base_branch }}
            **Attempt:** 3 / ${{ steps.checks_attempts.outputs.value }}

            ## Failing PR Checks
            ${{ steps.pr_checks_after_fix_2.outputs.summary }}

            ## Current Diff
            ```diff
            ${{ steps.current_diff_attempt_3.outputs.diff }}
            ```

            ## Rules
            - Make the failing PR checks pass on the current branch.
            - The check output above is the source of truth, even if it differs from build_command or test_command.
            - Prefer the smallest safe change that fixes the reported failure.
            - If the failure looks flaky or external to the repository, explain that instead of making risky code changes.
            - Follow this code style guide: ${{ inputs.code_style_guide }}
            - Build and verify with: ${{ inputs.build_command }}
            - Run relevant tests if possible with: ${{ inputs.test_command }}
            - If format_command is non-empty, run it on changed files after the fix: ${{ inputs.format_command }}
            - Do not modify files outside the scope of the requested changes.
            - Do not post issue comments, create PRs, or use GitHub tools for side effects.
            - Do not describe tool/auth limitations in the final response.
            - Return only the work summary; the workflow handles GitHub updates.
          model: ${{ inputs.model }}
          node_path: ${{ inputs.node_path }}
          codex_sandbox: ${{ inputs.codex_sandbox }}

      - name: Format checks fix changes attempt 3
        if: steps.cifix_3.outputs.exit_code == '0' && inputs.format_command != ''
        shell: bash
        env:
          FORMAT_COMMAND: ${{ inputs.format_command }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          mapfile -t changed_files < <(git diff --name-only "origin/${BASE_BRANCH}...HEAD")
          if [ ${#changed_files[@]} -eq 0 ]; then
            exit 0
          fi

          read -r -a formatter <<< "$FORMAT_COMMAND"
          "${formatter[@]}" "${changed_files[@]}"

      - name: Commit and push checks fix attempt 3
        if: steps.cifix_3.outcome == 'success' && steps.cifix_3.outputs.exit_code == '0'
        id: cifix_3_push
        shell: bash
        env:
          BOT_USER: ${{ inputs.bot_user }}
          BOT_EMAIL: ${{ inputs.bot_email }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          INITIAL_SHA: ${{ steps.cifix_3_initial_head.outputs.sha }}
        run: |
          git config user.name "$BOT_USER"
          git config user.email "$BOT_EMAIL"

          git add -A
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "fix: address failing PR checks on PR #${PR_NUMBER} (attempt 3)"
          fi

          if [ "$(git rev-parse HEAD)" = "$INITIAL_SHA" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          BRANCH_NAME="${{ steps.branch.outputs.name }}"
          if [ -n "$(git log "origin/${BRANCH_NAME}"..HEAD --oneline 2>/dev/null)" ]; then
            git push origin "$BRANCH_NAME" 2>&1
          fi

      - name: Post checks fix comment attempt 3
        if: steps.cifix_3_push.outputs.has_changes == 'true'
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: |
            ### Codex PR Checks Fix (Attempt 3)

            ${{ steps.cifix_3.outputs.result }}

            ---
            > 🤖 *Codex CI · [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          target: ${{ steps.pr.outputs.number }}
          type: pr
          repository: ${{ github.repository }}

      - name: Wait for PR checks after checks fix attempt 3
        if: steps.cifix_3_push.outputs.has_changes == 'true'
        id: pr_checks_after_fix_3
        uses: youngrok-XCENA/relay/.github/actions/collect-pr-checks@main
        with:
          repository: ${{ github.repository }}
          pr_number: ${{ steps.pr.outputs.number }}
          max_wait_minutes: ${{ inputs.check_wait_minutes }}
          poll_interval_seconds: ${{ inputs.check_poll_interval_seconds }}

      - name: Build final status comment
        if: always()
        id: final_comment
        shell: bash
        env:
          ANALYSIS_EXIT: ${{ steps.analysis.outputs.exit_code }}
          FIX_EXIT: ${{ steps.fix.outputs.exit_code }}
          FIX_FAILURE: ${{ steps.fix.outputs.failure_type }}
          FIX_RESULT: ${{ steps.fix.outputs.result }}
          HAS_CHANGES: ${{ steps.push.outputs.has_changes }}
          PR_URL: ${{ steps.pr.outputs.url }}
          REVIEW_EXIT: ${{ steps.review.outputs.exit_code }}
          NEEDS_FIX: ${{ steps.review_check.outputs.needs_fix }}
          PRFIX_EXIT: ${{ steps.prfix.outputs.exit_code }}
          PRFIX_RESULT: ${{ steps.prfix.outputs.result }}
          PRFIX_HAS_CHANGES: ${{ steps.prfix_push.outputs.has_changes }}
          CHECK_FIX_MAX_ATTEMPTS: ${{ steps.checks_attempts.outputs.value }}
          PR_CHECK_STATUS: ${{ steps.pr_checks.outputs.status }}
          PR_CHECK_SUMMARY: ${{ steps.pr_checks.outputs.summary }}
          CI_FIX_1_EXIT: ${{ steps.cifix.outputs.exit_code }}
          CI_FIX_1_RESULT: ${{ steps.cifix.outputs.result }}
          CI_FIX_1_HAS_CHANGES: ${{ steps.cifix_push.outputs.has_changes }}
          PR_CHECK_STATUS_AFTER_FIX_1: ${{ steps.pr_checks_after_fix.outputs.status }}
          PR_CHECK_SUMMARY_AFTER_FIX_1: ${{ steps.pr_checks_after_fix.outputs.summary }}
          CI_FIX_2_EXIT: ${{ steps.cifix_2.outputs.exit_code }}
          CI_FIX_2_RESULT: ${{ steps.cifix_2.outputs.result }}
          CI_FIX_2_HAS_CHANGES: ${{ steps.cifix_2_push.outputs.has_changes }}
          PR_CHECK_STATUS_AFTER_FIX_2: ${{ steps.pr_checks_after_fix_2.outputs.status }}
          PR_CHECK_SUMMARY_AFTER_FIX_2: ${{ steps.pr_checks_after_fix_2.outputs.summary }}
          CI_FIX_3_EXIT: ${{ steps.cifix_3.outputs.exit_code }}
          CI_FIX_3_RESULT: ${{ steps.cifix_3.outputs.result }}
          CI_FIX_3_HAS_CHANGES: ${{ steps.cifix_3_push.outputs.has_changes }}
          PR_CHECK_STATUS_AFTER_FIX_3: ${{ steps.pr_checks_after_fix_3.outputs.status }}
          PR_CHECK_SUMMARY_AFTER_FIX_3: ${{ steps.pr_checks_after_fix_3.outputs.summary }}
        run: |
          FOOTER="

          ---
          > 🤖 *Codex CI · [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          if [ "$ANALYSIS_EXIT" = "0" ]; then
            ANALYSIS_STATUS="✅ 완료"
          else
            ANALYSIS_STATUS="❌ 실패"
          fi

          if [ "$FIX_EXIT" != "0" ]; then
            if [ "$FIX_FAILURE" = "usage_limit" ]; then
              BODY="### Codex Auto Pipeline

          ❌ 파이프라인 실패 — Codex 사용량 한도에 도달했습니다. 한도 리셋 후 다시 시도하세요.${FOOTER}"
            elif [ "$FIX_FAILURE" = "auth_error" ]; then
              BODY="### Codex Auto Pipeline

          ❌ 파이프라인 실패 — 인증 오류. API 키를 확인하세요.${FOOTER}"
            else
              BODY="### Codex Auto Pipeline

          ❌ 코드 패치 단계에서 실패했습니다.${FOOTER}"
            fi
          elif [ "$HAS_CHANGES" = "false" ]; then
            BODY="### Codex Auto Pipeline

          수정할 내용을 찾지 못했습니다.

          <details><summary>Codex 출력</summary>

          ${FIX_RESULT}

          </details>${FOOTER}"
          elif [ -z "$PR_URL" ]; then
            BODY="### Codex Auto Pipeline

          ❌ PR 생성에 실패했습니다.${FOOTER}"
          else
            FIX_STATUS="✅ 완료"
            PR_STATUS="✅ ${PR_URL}"

            if [ "$REVIEW_EXIT" = "0" ]; then
              REVIEW_STATUS="✅ 완료"
              if [ "$NEEDS_FIX" = "true" ]; then
                if [ "$PRFIX_EXIT" = "0" ] && [ "$PRFIX_HAS_CHANGES" = "true" ]; then
                  PRFIX_STATUS="✅ 추가 패치 커밋 완료"
                elif [ "$PRFIX_EXIT" = "0" ]; then
                  PRFIX_STATUS="✅ 수정 불필요"
                else
                  PRFIX_STATUS="❌ 실패"
                fi
              else
                PRFIX_STATUS="⏭️ 스킵 (CRITICAL/HIGH 이슈 없음)"
              fi
            else
              REVIEW_STATUS="❌ 실패"
              PRFIX_STATUS="⏭️ 스킵 (리뷰 실패)"
            fi

            EFFECTIVE_CHECK_FIX_ATTEMPTS="${CHECK_FIX_MAX_ATTEMPTS:-1}"
            FINAL_CHECK_STATUS="$PR_CHECK_STATUS"
            FINAL_CHECK_SUMMARY="$PR_CHECK_SUMMARY"
            CHECKS_STATUS="⏭️ 미실행"
            CHECKS_FIX_STATUS="⏭️ 스킵"
            CHECK_FIX_ATTEMPTS_USED=0
            CHECK_FIX_FAILED_STEP=false
            CHECK_FIX_NO_CHANGES=false

            if [ "$PR_CHECK_STATUS" = "failed" ]; then
              if [ "$EFFECTIVE_CHECK_FIX_ATTEMPTS" = "0" ]; then
                CHECKS_STATUS="❌ 실패"
                CHECKS_FIX_STATUS="⏭️ 스킵 (max_check_fix_attempts=0)"
              else
                for attempt in 1 2 3; do
                  if [ "$attempt" -gt "$EFFECTIVE_CHECK_FIX_ATTEMPTS" ]; then
                    break
                  fi

                  EXIT_VAR="CI_FIX_${attempt}_EXIT"
                  RESULT_VAR="CI_FIX_${attempt}_RESULT"
                  CHANGES_VAR="CI_FIX_${attempt}_HAS_CHANGES"
                  AFTER_STATUS_VAR="PR_CHECK_STATUS_AFTER_FIX_${attempt}"
                  AFTER_SUMMARY_VAR="PR_CHECK_SUMMARY_AFTER_FIX_${attempt}"

                  ATTEMPT_EXIT="${!EXIT_VAR:-}"
                  ATTEMPT_RESULT="${!RESULT_VAR:-}"
                  ATTEMPT_HAS_CHANGES="${!CHANGES_VAR:-}"
                  ATTEMPT_AFTER_STATUS="${!AFTER_STATUS_VAR:-}"
                  ATTEMPT_AFTER_SUMMARY="${!AFTER_SUMMARY_VAR:-}"

                  if [ -z "$ATTEMPT_EXIT" ]; then
                    break
                  fi

                  CHECK_FIX_ATTEMPTS_USED="$attempt"

                  if [ "$ATTEMPT_EXIT" != "0" ]; then
                    CHECK_FIX_FAILED_STEP=true
                    CHECKS_FIX_STATUS="❌ ${attempt}차 패치 실패"
                    break
                  fi

                  if [ "$ATTEMPT_HAS_CHANGES" != "true" ]; then
                    CHECK_FIX_NO_CHANGES=true
                    CHECKS_FIX_STATUS="⚠️ ${attempt}차 수정안 없음"
                    break
                  fi

                  FINAL_CHECK_STATUS="$ATTEMPT_AFTER_STATUS"
                  FINAL_CHECK_SUMMARY="$ATTEMPT_AFTER_SUMMARY"

                  case "$FINAL_CHECK_STATUS" in
                    passed)
                      CHECKS_FIX_STATUS="✅ ${attempt}회 추가 패치 후 통과"
                      break
                      ;;
                    no_checks)
                      CHECKS_FIX_STATUS="✅ ${attempt}회 추가 패치 후 checks 없음"
                      break
                      ;;
                    timed_out)
                      CHECKS_FIX_STATUS="⏱️ ${attempt}회 추가 패치 후 재검증 타임아웃"
                      break
                      ;;
                    api_error)
                      CHECKS_FIX_STATUS="❌ ${attempt}회 추가 패치 후 조회 실패"
                      break
                      ;;
                    failed)
                      if [ "$attempt" -eq "$EFFECTIVE_CHECK_FIX_ATTEMPTS" ]; then
                        CHECKS_FIX_STATUS="❌ ${attempt}회 추가 패치 후에도 실패"
                      fi
                      ;;
                    *)
                      CHECKS_FIX_STATUS="⚠️ ${attempt}회 추가 패치 후 결과 미확인"
                      break
                      ;;
                  esac
                done

                case "$FINAL_CHECK_STATUS" in
                  passed)
                    CHECKS_STATUS="✅ 추가 패치 후 모두 통과"
                    ;;
                  no_checks)
                    CHECKS_STATUS="✅ 추가 패치 후 checks 없음"
                    ;;
                  timed_out)
                    CHECKS_STATUS="⏱️ 추가 패치 후 재검증 타임아웃"
                    ;;
                  api_error)
                    CHECKS_STATUS="❌ 추가 패치 후 조회 실패"
                    ;;
                  failed)
                    if [ "$CHECK_FIX_FAILED_STEP" = true ] || [ "$CHECK_FIX_NO_CHANGES" = true ] || [ "$CHECK_FIX_ATTEMPTS_USED" -eq 0 ]; then
                      CHECKS_STATUS="❌ 실패"
                    else
                      CHECKS_STATUS="❌ ${CHECK_FIX_ATTEMPTS_USED}회 추가 패치 후에도 실패"
                    fi
                    ;;
                  *)
                    CHECKS_STATUS="⚠️ 추가 패치 후 결과 미확인"
                    ;;
                esac
              fi
            else
              case "$PR_CHECK_STATUS" in
                passed)
                  CHECKS_STATUS="✅ 모두 통과"
                  CHECKS_FIX_STATUS="⏭️ 스킵 (실패 없음)"
                  ;;
                no_checks)
                  CHECKS_STATUS="⏭️ 등록된 checks 없음"
                  CHECKS_FIX_STATUS="⏭️ 스킵 (등록된 checks 없음)"
                  ;;
                timed_out)
                  CHECKS_STATUS="⏱️ 대기 타임아웃"
                  CHECKS_FIX_STATUS="⏭️ 스킵 (checks 완료 전 종료)"
                  ;;
                api_error)
                  CHECKS_STATUS="❌ 조회 실패"
                  CHECKS_FIX_STATUS="⏭️ 스킵 (checks 조회 실패)"
                  ;;
                *)
                  CHECKS_STATUS="⏭️ 미실행"
                  CHECKS_FIX_STATUS="⏭️ 스킵"
                  ;;
              esac
            fi

            BODY="### Codex Auto Pipeline

          | 단계 | 상태 |
          |------|------|
          | 1. 이슈 분석 | ${ANALYSIS_STATUS} |
          | 2. 코드 패치 | ${FIX_STATUS} |
          | 3. PR 생성 | ${PR_STATUS} |
          | 4. 코드 리뷰 | ${REVIEW_STATUS} |
          | 5. 리뷰 반영 | ${PRFIX_STATUS} |
          | 6. PR checks 확인 | ${CHECKS_STATUS} |
          | 7. checks 실패 반영 | ${CHECKS_FIX_STATUS} |${FOOTER}"
          fi

          {
            echo "body<<GHEOF"
            echo "$BODY"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post final status
        if: always()
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: ${{ steps.final_comment.outputs.body }}
          target: ${{ github.event.issue.number }}
          type: issue
          repository: ${{ github.repository }}

  notify-pipeline-timeout:
    name: Notify Pipeline Timeout
    needs: [auto-pipeline]
    if: inputs.mode == 'auto-pipeline' && cancelled()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: Post timeout comment
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: |
            ### Codex Auto Pipeline

            ⏱️ 파이프라인이 ${{ inputs.timeout_minutes }}분 타임아웃으로 취소되었습니다. [워크플로우 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})를 확인하세요.

            ---
            > 🤖 *Codex CI · [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          target: ${{ github.event.issue.number }}
          type: issue
          repository: ${{ github.repository }}

  triage-cleanup:
    name: Cleanup Session
    if: inputs.mode == 'triage' && github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Remove session file
        shell: bash
        run: |
          REPO_DIR="$HOME/codex-sessions/${{ github.repository }}"
          rm -f "${REPO_DIR}/issue-${{ github.event.issue.number }}"
          echo "::notice::Cleaned up codex session for ${{ github.repository }}#${{ github.event.issue.number }}"

  triage:
    name: Codex Issue Triage
    if: >
      inputs.mode == 'triage' &&
      (
        (github.event_name == 'issues' &&
         (github.event.action == 'opened' || github.event.action == 'reopened') &&
         contains(github.event.issue.title, inputs.title_keyword) &&
         !contains(github.event.issue.title, inputs.auto_title_keyword)) ||
        (github.event_name == 'issue_comment' &&
         !github.event.issue.pull_request &&
         startsWith(github.event.comment.body, inputs.trigger_command) &&
         github.event.comment.user.type != 'Bot' &&
         github.event.sender.login != 'github-actions[bot]')
      )
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    concurrency:
      group: codex-issue-${{ github.repository }}-${{ github.event.issue.number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: React with eyes (issue opened)
        if: github.event_name == 'issues'
        uses: youngrok-XCENA/relay/.github/actions/react-emoji@main
        with:
          url: ${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}
          reaction: eyes
          token: ${{ secrets.GH_PAT || github.token }}

      - name: React with eyes (comment trigger)
        if: github.event_name == 'issue_comment'
        uses: youngrok-XCENA/relay/.github/actions/react-emoji@main
        with:
          url: ${{ github.event.comment.url }}
          reaction: eyes
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}
          fetch-depth: 1
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Initialize submodules
        shell: bash
        run: git submodule update --init --recursive || { echo "::error::Submodule initialization failed"; exit 1; }

      - name: Load session
        id: session
        shell: bash
        run: |
          SESSION_DIR="$HOME/codex-sessions/${{ github.repository }}"
          mkdir -p "$SESSION_DIR"
          SESSION_FILE="${SESSION_DIR}/issue-${{ github.event.issue.number }}"

          echo "session_file=${SESSION_FILE}" >> "$GITHUB_OUTPUT"

          if [ -f "$SESSION_FILE" ]; then
            SESSION_ID=$(cat "$SESSION_FILE")
            if [ -z "$SESSION_ID" ]; then
              echo "::warning::Session file exists but is empty, removing"
              rm -f "$SESSION_FILE"
              echo "exists=false" >> "$GITHUB_OUTPUT"
            else
              echo "session_id=${SESSION_ID}" >> "$GITHUB_OUTPUT"
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Found existing codex session ${SESSION_ID} for issue #${{ github.event.issue.number }}"
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No existing codex session for issue #${{ github.event.issue.number }}"
          fi

      - name: Build prompt
        id: prompt
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login || '' }}
          PROJECT_DESCRIPTION: ${{ inputs.project_description }}
          TRIGGER_COMMAND: ${{ inputs.trigger_command }}
          SESSION_EXISTS: ${{ steps.session.outputs.exists }}
        run: |
          COMMENT_TEXT=$(printf "%s" "${COMMENT_BODY}" | sed "s|${TRIGGER_COMMAND}||" | xargs)

          if [ "$SESSION_EXISTS" = "true" ] && [ "${{ github.event_name }}" = "issue_comment" ] && [ -n "$COMMENT_TEXT" ]; then
            RESUME_PROMPT="${COMMENT_AUTHOR} commented:
          ${COMMENT_TEXT}

          ## Instructions
          - Continue the conversation naturally based on the comment above and your prior analysis.
          - If the comment asks a question, answer it with specific code references.
          - If the comment provides new information, update your analysis accordingly.
          - Be concise and actionable.
          - Reference specific file paths and function names from the codebase.
          - Write in the same language as the comment.
          - Return only the reply body text.
          - Do not post comments or use GitHub tools for side effects.
          - Do not describe tool/auth limitations.
          - The workflow will post the response."

            {
              echo "resume_prompt<<GHEOF_RESUME"
              echo "$RESUME_PROMPT"
              echo "GHEOF_RESUME"
              echo "has_resume=true"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_resume=false" >> "$GITHUB_OUTPUT"
          fi

          HISTORY=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" \
            --paginate \
            --jq '[.[] | "\(.user.login):\n\(.body // \"\")"] | join("\n\n---\n\n")' 2>/dev/null || echo "")

          FULL_PROMPT="You are analyzing a GitHub issue for the ${PROJECT_DESCRIPTION} project.

          ## Issue #${ISSUE_NUMBER}
          **Title:** ${ISSUE_TITLE}

          **Body:**
          ${ISSUE_BODY}"

          if [ -n "$HISTORY" ]; then
            FULL_PROMPT="${FULL_PROMPT}

          ## Conversation History
          ${HISTORY}"
          fi

          if [ -n "$COMMENT_TEXT" ]; then
            FULL_PROMPT="${FULL_PROMPT}

          ## Latest Comment
          ${COMMENT_AUTHOR}: ${COMMENT_TEXT}

          ## Instructions
          - Analyze the issue based on the issue body and comment history.
          - If the latest comment asks a question, answer it with specific code references.
          - If the latest comment provides new information, update your analysis accordingly.
          - If the latest comment is just a trigger, provide a concise issue analysis.
          - Be concise and actionable.
          - Reference specific file paths and function names from the codebase.
          - Write in the same language as the latest comment.
          - Return only the reply body text.
          - Do not post comments or use GitHub tools for side effects.
          - Do not describe tool/auth limitations.
          - The workflow will post the response."
          else
            FULL_PROMPT="${FULL_PROMPT}

          ## Instructions
          - This is a READ-ONLY analysis step. Do NOT modify, edit, or write any files. Do NOT run fix commands. Only read and analyze.
          - Determine whether this issue is a bug report, an improvement request, or a general task.
          - Identify which code modules and files are relevant.
          - Assess the impact and scope.
          - Suggest a concrete action plan (fix, refactor, or new implementation).
          - If the issue lacks information, list what additional details are needed.
          - Be concise and actionable.
          - Do not include meta-commentary about your own process (e.g. "Let me compile the analysis").
          - Start directly with the analysis content.
          - Reference specific file paths and function names from the codebase.
          - Return only the analysis body text.
          - Do not post comments or use GitHub tools for side effects.
          - Do not describe tool/auth limitations.
          - The workflow will post the response."
          fi

          {
            echo "full_prompt<<GHEOF_FULL"
            echo "$FULL_PROMPT"
            echo "GHEOF_FULL"
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex
        id: codex
        uses: youngrok-XCENA/relay/.github/actions/run-codex@main
        with:
          prompt: ${{ steps.prompt.outputs.full_prompt }}
          resume_prompt: ${{ steps.prompt.outputs.resume_prompt }}
          model: ${{ inputs.model }}
          node_path: ${{ inputs.node_path }}
          codex_sandbox: ${{ inputs.codex_sandbox }}
          resume_session: ${{ steps.prompt.outputs.has_resume }}
          session_id: ${{ steps.session.outputs.session_id }}
          session_file: ${{ steps.session.outputs.session_file }}

      - name: Build triage comment
        if: always()
        id: comment
        shell: bash
        env:
          RESULT: ${{ steps.codex.outputs.result }}
          EXIT_CODE: ${{ steps.codex.outputs.exit_code }}
          FAILURE_TYPE: ${{ steps.codex.outputs.failure_type }}
        run: |
          FOOTER="

          ---
          > 🤖 *Codex CI · [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          if [ "$EXIT_CODE" = "0" ] && [ -n "$RESULT" ]; then
            BODY="### Codex Issue Analysis

          ${RESULT}${FOOTER}"
          elif [ "$FAILURE_TYPE" = "usage_limit" ]; then
            BODY="### Codex Issue Analysis

          ❌ Analysis could not run because the Codex account appears to have reached its usage limit. Retry after the limit resets or more quota is available. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).${FOOTER}"
          elif [ "$FAILURE_TYPE" = "auth_error" ]; then
            BODY="### Codex Issue Analysis

          ❌ Analysis could not run due to an authentication error. The Codex API token may be expired or invalid. Please re-issue the API key and update the \`OPENAI_API_KEY\` secret. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).${FOOTER}"
          else
            BODY="### Codex Issue Analysis

          ❌ Analysis failed. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).${FOOTER}"
          fi

          {
            echo "body<<GHEOF"
            echo "$BODY"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post triage comment
        if: always()
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: ${{ steps.comment.outputs.body }}
          target: ${{ github.event.issue.number }}
          type: issue
          repository: ${{ github.repository }}

      - name: React completion (comment trigger)
        if: always() && github.event_name == 'issue_comment'
        uses: youngrok-XCENA/relay/.github/actions/react-emoji@main
        with:
          url: ${{ github.event.comment.url }}
          reaction: ${{ steps.codex.outputs.exit_code == '0' && 'rocket' || '-1' }}
          token: ${{ secrets.GH_PAT || github.token }}

  notify-triage-timeout:
    name: Notify Triage Timeout
    needs: [triage]
    if: inputs.mode == 'triage' && cancelled()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: Post timeout comment
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: |
            ### Codex Issue Analysis

            ⏱️ Analysis timed out after ${{ inputs.timeout_minutes }} minutes. The self-hosted runner may be unavailable or under heavy load. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) and retry.
          target: ${{ github.event.issue.number }}
          type: issue
          repository: ${{ github.repository }}
