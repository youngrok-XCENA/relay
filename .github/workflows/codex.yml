name: Relay Codex

on:
  workflow_call:
    inputs:
      mode:
        type: string
        required: true
      model:
        type: string
        default: "gpt-5.4"
      project_description:
        type: string
        required: true
      build_command:
        type: string
        required: false
        default: ""
      test_command:
        type: string
        required: false
        default: ""
      format_command:
        type: string
        default: ""
      code_style_guide:
        type: string
        required: false
        default: ""
      file_extensions:
        type: string
        default: ""
      review_focus:
        type: string
        default: ""
      max_diff_size:
        type: number
        default: 100000
      node_path:
        type: string
        default: ""
      codex_sandbox:
        type: string
        default: "read-only"
      trigger_command:
        type: string
        default: "/codex-issue"
      title_keyword:
        type: string
        default: "codex"
      auto_title_keyword:
        type: string
        default: "codex-auto"
      trigger_label:
        type: string
        default: "auto-fix"
      branch_prefix:
        type: string
        default: "codex/fix-issue-"
      base_branch:
        type: string
        default: "main"
      bot_user:
        type: string
        default: "codex-ci[bot]"
      bot_email:
        type: string
        default: "codex-ci[bot]@users.noreply.github.com"
      pr_template:
        type: string
        default: ""
      timeout_minutes:
        type: number
        default: 30
      check_wait_minutes:
        type: number
        default: 10
      check_poll_interval_seconds:
        type: number
        default: 15
      max_check_fix_attempts:
        type: number
        default: 3
      runner:
        type: string
        default: '["self-hosted", "codex-ci"]'
    secrets:
      GH_PAT:
        required: false

jobs:
  parse-review:
    name: Parse command
    if: >
      inputs.mode == 'review' &&
      startsWith(github.event.comment.body, '/codex-review') &&
      (github.event_name == 'pull_request_review_comment' || github.event.issue.pull_request)
    runs-on: ubuntu-latest
    outputs:
      prompt: ${{ steps.extract.outputs.prompt }}
      head_ref: ${{ steps.pr-info.outputs.head_ref }}
      base_ref: ${{ steps.pr-info.outputs.base_ref }}
      pr_number: ${{ steps.pr-info.outputs.pr_number }}
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: React with eyes
        uses: youngrok-XCENA/relay/.github/actions/react-emoji@main
        with:
          url: ${{ github.event.comment.url }}
          reaction: eyes
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Extract user prompt
        id: extract
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          prompt=$(echo "$COMMENT_BODY" | sed 's|/codex-review||' | xargs)
          {
            echo "prompt<<GHEOF"
            echo "$prompt"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get PR info
        id: pr-info
        shell: bash
        run: |
          PR_URL="${{ github.event.issue.pull_request.url || github.event.pull_request.url }}"
          PR_JSON=$(curl -s -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github.v3+json" "$PR_URL")
          {
            echo "head_ref=$(echo "$PR_JSON" | jq -r '.head.ref')"
            echo "base_ref=$(echo "$PR_JSON" | jq -r '.base.ref')"
            echo "pr_number=$(echo "$PR_JSON" | jq -r '.number')"
          } >> "$GITHUB_OUTPUT"

  review:
    name: Codex Review
    needs: [parse-review]
    if: inputs.mode == 'review' && needs.parse-review.result == 'success'
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    concurrency:
      group: codex-pr-${{ needs.parse-review.outputs.pr_number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
      FILE_EXTENSIONS: ${{ inputs.file_extensions }}
      MAX_DIFF_SIZE: ${{ inputs.max_diff_size }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse-review.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Get diff
        id: diff
        shell: bash
        run: |
          read -r -a patterns <<< "$FILE_EXTENSIONS"
          DIFF=$(git diff "origin/${{ needs.parse-review.outputs.base_ref }}...origin/${{ needs.parse-review.outputs.head_ref }}" -- "${patterns[@]}" | head -c "$MAX_DIFF_SIZE")
          {
            echo "diff<<GHEOF"
            echo "$DIFF"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build review prompt
        id: prompt
        shell: bash
        env:
          USER_PROMPT: ${{ needs.parse-review.outputs.prompt }}
          DIFF: ${{ steps.diff.outputs.diff }}
          PROJECT_DESCRIPTION: ${{ inputs.project_description }}
          REVIEW_FOCUS: ${{ inputs.review_focus }}
          CODE_STYLE_GUIDE: ${{ inputs.code_style_guide }}
        run: |
          PROMPT="You are reviewing a pull request for the ${PROJECT_DESCRIPTION} project.

          ## Review Guidelines
          - Focus on: ${REVIEW_FOCUS}
          - Code style: ${CODE_STYLE_GUIDE}
          - Classify issues as CRITICAL / HIGH / MEDIUM / LOW
          - Be specific with file paths and line numbers
          - Be concise. Skip praise, go straight to issues.
          - Return only the review comment body text
          - Do not post comments, reviews, or use GitHub tools
          - Do not describe tool/auth limitations
          - The workflow will post the review

          ## PR Diff
          \`\`\`diff
          ${DIFF}
          \`\`\`"

          if [ -n "$USER_PROMPT" ]; then
            PROMPT="${PROMPT}

          ## Additional Instructions
          ${USER_PROMPT}"
          fi

          {
            echo "prompt<<GHEOF"
            echo "$PROMPT"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex
        id: codex
        uses: youngrok-XCENA/relay/.github/actions/run-codex@main
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          model: ${{ inputs.model }}
          node_path: ${{ inputs.node_path }}
          codex_sandbox: ${{ inputs.codex_sandbox }}

      - name: Build review comment
        if: always()
        id: comment
        shell: bash
        env:
          RESULT: ${{ steps.codex.outputs.result }}
          EXIT_CODE: ${{ steps.codex.outputs.exit_code }}
          FAILURE_TYPE: ${{ steps.codex.outputs.failure_type }}
        run: |
          FOOTER="

          ---
          > 🤖 *Codex CI · [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          if [ "$EXIT_CODE" = "0" ] && [ -n "$RESULT" ]; then
            BODY="### Codex Review

          ${RESULT}${FOOTER}"
          elif [ "$FAILURE_TYPE" = "usage_limit" ]; then
            BODY="### Codex Review

          ❌ Review could not run because the Codex account appears to have reached its usage limit. Retry after the limit resets or more quota is available. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).${FOOTER}"
          elif [ "$FAILURE_TYPE" = "auth_error" ]; then
            BODY="### Codex Review

          ❌ Review could not run due to an authentication error. The Codex API token may be expired or invalid. Please re-issue the API key and update the \`OPENAI_API_KEY\` secret. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).${FOOTER}"
          else
            BODY="### Codex Review

          ❌ Review failed. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).${FOOTER}"
          fi

          {
            echo "body<<GHEOF"
            echo "$BODY"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post review comment
        if: always()
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: ${{ steps.comment.outputs.body }}
          target: ${{ needs.parse-review.outputs.pr_number }}
          type: pr
          repository: ${{ github.repository }}

      - name: React completion
        if: always()
        uses: youngrok-XCENA/relay/.github/actions/react-emoji@main
        with:
          url: ${{ github.event.comment.url }}
          reaction: ${{ steps.codex.outputs.exit_code == '0' && 'rocket' || '-1' }}
          token: ${{ secrets.GH_PAT || github.token }}

  notify-review-timeout:
    name: Notify Review Timeout
    needs: [parse-review, review]
    if: inputs.mode == 'review' && cancelled() && needs.parse-review.result == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: Post timeout comment
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: |
            ### Codex Review

            ⏱️ Review timed out. The self-hosted runner may be unavailable or under heavy load. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) and retry.
          target: ${{ needs.parse-review.outputs.pr_number }}
          type: pr
          repository: ${{ github.repository }}

  fix:
    name: Codex Fix
    if: >
      inputs.mode == 'fix' &&
      !github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/codex-fix')
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    concurrency:
      group: codex-fix-${{ github.event.issue.number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: React with eyes
        uses: youngrok-XCENA/relay/.github/actions/react-emoji@main
        with:
          url: ${{ github.event.comment.url }}
          reaction: eyes
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Create fix branch
        id: branch
        shell: bash
        env:
          BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        run: |
          BRANCH="${BRANCH_PREFIX}${{ github.event.issue.number }}"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Initialize submodules
        shell: bash
        run: git submodule update --init --recursive || { echo "::error::Submodule initialization failed"; exit 1; }

      - name: Collect issue context
        id: context
        shell: bash
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PROJECT_DESCRIPTION: ${{ inputs.project_description }}
          BUILD_COMMAND: ${{ inputs.build_command }}
          TEST_COMMAND: ${{ inputs.test_command }}
          FORMAT_COMMAND: ${{ inputs.format_command }}
          CODE_STYLE_GUIDE: ${{ inputs.code_style_guide }}
          PR_TEMPLATE: ${{ inputs.pr_template }}
        run: |
          COMMENTS=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" \
            --paginate \
            --jq '[.[] | select(.body | startswith("### Codex")) | .body] | join("\n\n---\n\n")' 2>/dev/null || echo "")

          USER_PROMPT=$(echo "$COMMENT_BODY" | sed 's|/codex-fix||' | xargs)

          # Read PR template from the repository if not provided via input
          TMPL="$PR_TEMPLATE"
          if [ -z "$TMPL" ]; then
            for f in .github/pull_request_template.md .github/PULL_REQUEST_TEMPLATE.md; do
              if [ -f "$f" ]; then
                TMPL=$(cat "$f")
                break
              fi
            done
          fi

          PROMPT="You are fixing a GitHub issue for the ${PROJECT_DESCRIPTION} project.

          ## Issue #${ISSUE_NUMBER}
          **Title:** ${ISSUE_TITLE}

          **Body:**
          ${ISSUE_BODY}"

          if [ -n "$COMMENTS" ]; then
            PROMPT="${PROMPT}

          ## Previous Analysis
          ${COMMENTS}"
          fi

          if [ -n "$USER_PROMPT" ]; then
            PROMPT="${PROMPT}

          ## Additional Instructions
          ${USER_PROMPT}"
          fi

          PROMPT="${PROMPT}

          ## Rules
          - Fix only the issue described above. Do not refactor unrelated code.
          - Follow this code style guide: ${CODE_STYLE_GUIDE}
          - Build and verify with: ${BUILD_COMMAND}
          - Run relevant tests if possible with: ${TEST_COMMAND}
          - If format_command is non-empty, run it on changed files after the fix: ${FORMAT_COMMAND}
          - If you add new functionality, write tests for it.
          - Do not modify files outside the scope of this issue.
          - Do not post issue comments, create PRs, or use GitHub tools for side effects.
          - Do not describe tool/auth limitations in the final response.
          - Do not include meta-commentary about your own process."

          if [ -n "$TMPL" ]; then
            PROMPT="${PROMPT}
          - Return ONLY the work summary formatted as a PR body that follows the PR template below. Fill in each section of the template with relevant content from your fix. Remove HTML comments. Leave optional sections empty (with just a dash) if not applicable.

          ## PR Template
          ${TMPL}"
          else
            PROMPT="${PROMPT}
          - Return ONLY the work summary in the following format, with no preamble:

          ### Why
          Explain why this change is needed. What problem exists if this is not applied?

          ### What changed
          Describe what was changed concisely.

          ### Design changes (optional)
          If there are structural changes (e.g. call flow, module boundaries, data flow), include a mermaid diagram. Skip this section if the change is simple (config, typo, single-function edit)."
          fi

          {
            echo "prompt<<GHEOF"
            echo "$PROMPT"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex
        id: codex
        uses: youngrok-XCENA/relay/.github/actions/run-codex@main
        with:
          prompt: ${{ steps.context.outputs.prompt }}
          model: ${{ inputs.model }}
          node_path: ${{ inputs.node_path }}
          codex_sandbox: ${{ inputs.codex_sandbox }}

      - name: Format changed files
        if: steps.codex.outputs.exit_code == '0' && inputs.format_command != ''
        shell: bash
        env:
          FORMAT_COMMAND: ${{ inputs.format_command }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          mapfile -t changed_files < <(git diff --name-only "${BASE_BRANCH}...HEAD")
          if [ ${#changed_files[@]} -eq 0 ]; then
            exit 0
          fi

          read -r -a formatter <<< "$FORMAT_COMMAND"
          "${formatter[@]}" "${changed_files[@]}"

      - name: Commit and push changes
        if: steps.codex.outputs.exit_code == '0'
        id: push
        shell: bash
        env:
          BOT_USER: ${{ inputs.bot_user }}
          BOT_EMAIL: ${{ inputs.bot_email }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          git config user.name "$BOT_USER"
          git config user.email "$BOT_EMAIL"

          git add -A
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "fix: address issue #${{ github.event.issue.number }}"
          fi

          if [ -z "$(git log "${BASE_BRANCH}"..HEAD --oneline)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git push origin "${{ steps.branch.outputs.name }}" 2>&1

      - name: Create PR
        if: steps.codex.outputs.exit_code == '0' && steps.push.outputs.has_changes == 'true'
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          RESULT: ${{ steps.codex.outputs.result }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          EXISTING_PR=$(gh pr list --repo "${{ github.repository }}" --head "${BRANCH_NAME}" --json url --jq '.[0].url // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "url=${EXISTING_PR}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_BODY_FILE=$(mktemp)
          {
            echo "${RESULT}" | head -c 60000
            echo ""
            echo ""
            echo "Closes #${ISSUE_NUMBER}"
          } > "$PR_BODY_FILE"

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --head "${BRANCH_NAME}" \
            --base "${BASE_BRANCH}" \
            --title "fix: ${ISSUE_TITLE}" \
            --body-file "$PR_BODY_FILE" 2>&1 | grep -o 'https://.*' || true)

          rm -f "$PR_BODY_FILE"

          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr list --repo "${{ github.repository }}" --head "${BRANCH_NAME}" --json url --jq '.[0].url // empty')
          fi

          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Build fix comment
        if: always()
        id: comment
        shell: bash
        env:
          EXIT_CODE: ${{ steps.codex.outputs.exit_code }}
          FAILURE_TYPE: ${{ steps.codex.outputs.failure_type }}
          RESULT: ${{ steps.codex.outputs.result }}
          HAS_CHANGES: ${{ steps.push.outputs.has_changes }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          if [ "$EXIT_CODE" != "0" ] && [ "$FAILURE_TYPE" = "usage_limit" ]; then
            BODY="### Codex Fix

          ❌ 수정을 실행할 수 없습니다. Codex 계정이 사용량 한도에 도달한 것 같습니다. 한도가 리셋되거나 추가 쿼터가 생기면 재시도하세요. [워크플로우 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})를 확인하세요."
          elif [ "$EXIT_CODE" != "0" ] && [ "$FAILURE_TYPE" = "auth_error" ]; then
            BODY="### Codex Fix

          ❌ 수정을 실행할 수 없습니다. 인증 오류가 발생했습니다. Codex API 토큰이 만료되었거나 유효하지 않을 수 있습니다. \`OPENAI_API_KEY\` 시크릿을 갱신해 주세요. [워크플로우 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})를 확인하세요."
          elif [ "$EXIT_CODE" != "0" ]; then
            BODY="### Codex Fix

          ❌ 수정에 실패했습니다. [워크플로우 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})를 확인하세요."
          elif [ "$HAS_CHANGES" = "true" ] && [ -n "$PR_URL" ]; then
            BODY="### Codex Fix

          PR 생성 완료: ${PR_URL}

          <details><summary>Codex 작업 내용</summary>

          ${RESULT}

          </details>"
          elif [ "$HAS_CHANGES" = "false" ]; then
            BODY="### Codex Fix

          수정할 내용을 찾지 못했습니다.

          <details><summary>Codex 출력</summary>

          ${RESULT}

          </details>"
          else
            BODY="### Codex Fix

          ❌ PR 생성 또는 푸시에 실패했습니다. [워크플로우 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})를 확인하세요."
          fi

          {
            echo "body<<GHEOF"
            echo "$BODY"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post result comment
        if: always()
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: ${{ steps.comment.outputs.body }}
          target: ${{ github.event.issue.number }}
          type: issue
          repository: ${{ github.repository }}

      - name: React completion
        if: always()
        uses: youngrok-XCENA/relay/.github/actions/react-emoji@main
        with:
          url: ${{ github.event.comment.url }}
          reaction: ${{ steps.codex.outputs.exit_code == '0' && (steps.push.outputs.has_changes == 'false' || steps.pr.outputs.url != '') && 'rocket' || '-1' }}
          token: ${{ secrets.GH_PAT || github.token }}

  notify-fix-timeout:
    name: Notify Fix Timeout
    needs: [fix]
    if: inputs.mode == 'fix' && cancelled()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: Post timeout comment
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: |
            ### Codex Fix

            ⏱️ Fix timed out after ${{ inputs.timeout_minutes }} minutes. The self-hosted runner may be unavailable or under heavy load. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) and retry.
          target: ${{ github.event.issue.number }}
          type: issue
          repository: ${{ github.repository }}

  auto-pipeline:
    name: Codex Auto Pipeline
    if: >
      inputs.mode == 'auto-pipeline' &&
      github.event_name == 'issues' &&
      (
        (
          (github.event.action == 'opened' || github.event.action == 'reopened') &&
          contains(github.event.issue.title, inputs.auto_title_keyword)
        ) ||
        (
          github.event.action == 'labeled' &&
          github.event.label.name == inputs.trigger_label
        )
      )
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    concurrency:
      group: codex-auto-pipeline-${{ github.event.issue.number }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: React with eyes
        uses: youngrok-XCENA/relay/.github/actions/react-emoji@main
        with:
          url: ${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}
          reaction: eyes
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Post start comment
        uses: youngrok-XCENA/relay/.github/actions/post-comment@main
        with:
          body: |
            ### Codex Auto Pipeline

            🚀 자동 파이프라인을 시작합니다.

            | 단계 | 상태 |
            |------|------|
            | 1. 이슈 분석 | ⏳ 진행 중 |
            | 2. 코드 패치 | ⬜ 대기 |
            | 3. PR 생성 | ⬜ 대기 |
            | 4. 코드 리뷰 | ⬜ 대기 |
            | 5. 리뷰 반영 | ⬜ 대기 |
            | 6. PR checks 확인 | ⬜ 대기 |
            | 7. checks 실패 반영 | ⬜ 대기 |

            ---
            > 🤖 *Codex CI · [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          target: ${{ github.event.issue.number }}
          type: issue
          repository: ${{ github.repository }}

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Create fix branch
        id: branch
        shell: bash
        env:
          BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        run: |
          BRANCH="${BRANCH_PREFIX}${{ github.event.issue.number }}"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Initialize submodules
        shell: bash
        run: git submodule update --init --recursive || { echo "::error::Submodule initialization failed"; exit 1; }

      - name: Analyze issue
        id: analysis
        uses: youngrok-XCENA/relay/.github/actions/run-codex@main
        with:
          prompt: |
            You are analyzing a GitHub issue for the ${{ inputs.project_description }} project.

            ## Issue #${{ github.event.issue.number }}
            **Title:** ${{ github.event.issue.title }}

            **Body:**
