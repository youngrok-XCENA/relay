name: Relay Claude Caller
on:
  issues:
    types: [opened, reopened, closed, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  review:
    if: >
      startsWith(github.event.comment.body, '/claude-review') &&
      (github.event_name == 'pull_request_review_comment' || github.event.issue.pull_request)
    uses: youngrok-XCENA/relay/.github/workflows/claude.yml@main
    with:
      mode: review
      project_description: "GitHub Actions reusable CI workflows (YAML/Shell)"
      code_style_guide: "YAML/Shell scripting conventions"
      file_extensions: "*.yml *.yaml *.sh *.json"
      max_review_turns: 10
      timeout_minutes: 15
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  fix:
    if: >
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/claude-fix')
    uses: youngrok-XCENA/relay/.github/workflows/claude.yml@main
    with:
      mode: fix
      project_description: "GitHub Actions reusable CI workflows (YAML/Shell)"
      code_style_guide: "YAML/Shell scripting conventions"
      base_branch: "main"
      timeout_minutes: 30
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  pr-fix:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/claude-fix')
    uses: youngrok-XCENA/relay/.github/workflows/claude.yml@main
    with:
      mode: pr-fix
      project_description: "GitHub Actions reusable CI workflows (YAML/Shell)"
      code_style_guide: "YAML/Shell scripting conventions"
      timeout_minutes: 30
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  triage:
    if: >
      (github.event_name == 'issues' &&
       (github.event.action == 'closed' ||
        (contains(github.event.issue.title, 'claude') && !contains(github.event.issue.title, 'claude-auto')))) ||
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/claude-issue') &&
       github.event.comment.user.type != 'Bot' &&
       github.event.sender.login != 'github-actions[bot]')
    uses: youngrok-XCENA/relay/.github/workflows/claude.yml@main
    with:
      mode: triage
      project_description: "GitHub Actions reusable CI workflows (YAML/Shell)"
      trigger_command: "/claude-issue"
      title_keyword: "claude"
      max_turns: 15
      timeout_minutes: 20
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  auto-pipeline:
    if: >
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'auto-fix') ||
      (github.event_name == 'issues' &&
       (github.event.action == 'opened' || github.event.action == 'reopened') &&
       contains(github.event.issue.title, 'claude-auto'))
    uses: youngrok-XCENA/relay/.github/workflows/claude.yml@main
    with:
      mode: auto-pipeline
      project_description: "GitHub Actions reusable CI workflows (YAML/Shell)"
      code_style_guide: "YAML/Shell scripting conventions"
      file_extensions: "*.yml *.yaml *.sh *.json"
      timeout_minutes: 60
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
