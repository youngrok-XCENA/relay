name: Cppcheck

on:
  workflow_call:
    inputs:
      excluded_paths:
        type: string
        default: "module/|out/|build/"
      file_extensions:
        type: string
        default: "*.c *.cc *.cpp *.cxx *.h *.hh *.hpp *.hxx"
      suppressions:
        type: string
        default: "missingIncludeSystem"
      suppressions_file:
        type: string
        default: "suppressions.txt"
      library:
        type: string
        default: "googletest"
      enable_checks:
        type: string
        default: "all"
      inconclusive:
        type: boolean
        default: true
      fail_on_error:
        type: boolean
        default: true

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Get modified C and C++ files
        id: modified
        shell: bash
        env:
          FILE_EXTENSIONS: ${{ inputs.file_extensions }}
          EXCLUDED_PATHS: ${{ inputs.excluded_paths }}
        run: |
          base_sha=${{ github.event.pull_request.base.sha }}
          head_sha=${{ github.event.pull_request.head.sha }}

          read -r -a patterns <<< "$FILE_EXTENSIONS"
          files=$(git diff --name-only --diff-filter=ACMR "$base_sha" "$head_sha" -- "${patterns[@]}" || true)

          if [ -n "$EXCLUDED_PATHS" ]; then
            files=$(printf "%s\n" "$files" | grep -Ev "^(${EXCLUDED_PATHS})" || true)
          fi

          files=$(printf "%s\n" "$files" | sed '/^$/d')

          if [ -z "$files" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo "has_files=true"
              echo "files<<GHEOF"
              echo "$files"
              echo "GHEOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Run cppcheck
        if: steps.modified.outputs.has_files == 'true'
        shell: bash
        env:
          FILES: ${{ steps.modified.outputs.files }}
          ENABLE_CHECKS: ${{ inputs.enable_checks }}
          INCONCLUSIVE: ${{ inputs.inconclusive }}
          LIBRARY: ${{ inputs.library }}
          SUPPRESSIONS: ${{ inputs.suppressions }}
          SUPPRESSIONS_FILE: ${{ inputs.suppressions_file }}
        run: |
          args=(
            "--enable=${ENABLE_CHECKS}"
            --inline-suppr
            "--library=${LIBRARY}"
            --xml
            --output-file=cppcheck_results.xml
          )

          if [ "$INCONCLUSIVE" = "true" ]; then
            args+=(--inconclusive)
          fi

          IFS=',' read -r -a suppressions <<< "$SUPPRESSIONS"
          for suppression in "${suppressions[@]}"; do
            [ -z "$suppression" ] && continue
            args+=("--suppress=${suppression}")
          done

          if [ -n "$SUPPRESSIONS_FILE" ] && [ -f "$SUPPRESSIONS_FILE" ]; then
            args+=("--suppressions-list=${SUPPRESSIONS_FILE}")
          fi

          mapfile -t file_list <<< "$FILES"
          echo "Running cppcheck on ${#file_list[@]} file(s)"

          set +e
          cppcheck "${args[@]}" "${file_list[@]}"
          CPP_CHECK_EXIT=$?
          set -e

          echo "cppcheck exit code: ${CPP_CHECK_EXIT}"

      - name: Evaluate results
        if: steps.modified.outputs.has_files == 'true'
        id: evaluate
        shell: bash
        run: |
          python3 - <<'PY'
          import collections
          import os
          import sys
          import xml.etree.ElementTree as ET

          path = "cppcheck_results.xml"
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          output_path = os.environ["GITHUB_OUTPUT"]

          with open(summary_path, "a", encoding="utf-8") as summary:
            summary.write("## Cppcheck Results\n")

            if not os.path.exists(path):
              summary.write("No cppcheck results file found.\n")
              with open(output_path, "a", encoding="utf-8") as out:
                out.write("error_count=0\n")
                out.write("total_count=0\n")
              sys.exit(0)

            tree = ET.parse(path)
            errors = tree.findall(".//error")
            counts = collections.Counter(error.get("severity", "unknown") for error in errors)

            summary.write(f"Total findings: {len(errors)}\n\n")
            if counts:
              for severity in sorted(counts):
                summary.write(f"- {severity}: {counts[severity]}\n")
              summary.write("\n")
            else:
              summary.write("No findings.\n")

            if errors:
              summary.write("### Findings\n")
              summary.write("```\n")
              for error in errors[:200]:
                loc = error.find("location")
                file_name = loc.get("file", "") if loc is not None else ""
                line = loc.get("line", "") if loc is not None else ""
                severity = error.get("severity", "unknown")
                message = error.get("msg") or error.get("verbose") or ""
                summary.write(f"{severity}: {file_name}:{line} {message}\n")
              if len(errors) > 200:
                summary.write(f"... truncated {len(errors) - 200} additional findings\n")
              summary.write("```\n")

            with open(output_path, "a", encoding="utf-8") as out:
              out.write(f"error_count={counts.get('error', 0)}\n")
              out.write(f"total_count={len(errors)}\n")
          PY

      - name: Fail on cppcheck errors
        if: >
          steps.modified.outputs.has_files == 'true' &&
          inputs.fail_on_error &&
          steps.evaluate.outputs.error_count != '0'
        run: |
          echo "Cppcheck reported ${{ steps.evaluate.outputs.error_count }} error-severity finding(s)."
          exit 1

      - name: No files to check
        if: steps.modified.outputs.has_files != 'true'
        run: |
          echo "## Cppcheck Results" >> "$GITHUB_STEP_SUMMARY"
          echo "No modified C/C++ files to check." >> "$GITHUB_STEP_SUMMARY"
